<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mimamori-server</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f23;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status {
      font-size: 1.2rem;
      color: #888;
      margin-bottom: 2rem;
    }
    .powered-by {
      font-size: 0.85rem;
      color: #555;
    }
    .powered-by a {
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>mimamori-server</h1>
    <p class="status">見守りサービス API サーバーです。ブラウザから利用する画面はありません。</p>
    <p class="powered-by">Powered by <a href="https://devrelay.io">DevRelay</a> Testflight</p>
  </div>
</body>
</html>
